services:
  app:
    build:
      context: .
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
    command: sh -c "composer install --prefer-source --no-interaction --no-progress && (php artisan storage:link || true) && php-fpm"
    depends_on:
      - postgres
      - redis

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bookmarket
      POSTGRES_USER: bookmarket
      POSTGRES_PASSWORD: bookmarket
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  queue:
    build:
      context: .
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
    command: sh -c "until [ -f vendor/autoload.php ]; do sleep 2; done; php artisan queue:work --tries=3"
    depends_on:
      - postgres
      - redis

  reverb:
    build:
      context: .
    working_dir: /var/www/html
    ports:
      - "8080:8080"
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
    command: sh -c "until [ -f vendor/autoload.php ]; do sleep 2; done; php artisan reverb:start --host=0.0.0.0 --port=8080"
    depends_on:
      - app
      - redis

volumes:
  postgres-data:
  vendor:
