x-app-image: &app-image
  build:
    context: .
    dockerfile: Dockerfile.coolify
  restart: unless-stopped
  volumes:
    - app-storage:/var/www/html/storage
  environment: &app-env
    APP_NAME: ${APP_NAME:-BookMarket}
    APP_ENV: ${APP_ENV:-production}
    APP_KEY: ${APP_KEY:-}
    APP_DEBUG: ${APP_DEBUG:-false}
    APP_URL: ${APP_URL:-https://perrin.skrbe.com}
    APP_LOCALE: ${APP_LOCALE:-pt_BR}
    APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE:-en}
    APP_FAKER_LOCALE: ${APP_FAKER_LOCALE:-pt_BR}
    APP_MAINTENANCE_DRIVER: ${APP_MAINTENANCE_DRIVER:-file}
    BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
    LOG_CHANNEL: ${LOG_CHANNEL:-stack}
    LOG_STACK: ${LOG_STACK:-single}
    LOG_DEPRECATIONS_CHANNEL: ${LOG_DEPRECATIONS_CHANNEL:-null}
    LOG_LEVEL: ${LOG_LEVEL:-info}
    DB_CONNECTION: ${DB_CONNECTION:-pgsql}
    DB_HOST: ${DB_HOST:-postgres}
    DB_PORT: ${DB_PORT:-5432}
    DB_DATABASE: ${DB_DATABASE:-bookmarket}
    DB_USERNAME: ${DB_USERNAME:-bookmarket}
    DB_PASSWORD: ${DB_PASSWORD:-bookmarket}
    DB_SSLMODE: ${DB_SSLMODE:-prefer}
    SESSION_DRIVER: ${SESSION_DRIVER:-database}
    SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
    SESSION_ENCRYPT: ${SESSION_ENCRYPT:-false}
    SESSION_PATH: ${SESSION_PATH:-/}
    SESSION_DOMAIN: ${SESSION_DOMAIN:-null}
    SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-true}
    BROADCAST_CONNECTION: ${BROADCAST_CONNECTION:-reverb}
    FILESYSTEM_DISK: ${FILESYSTEM_DISK:-public}
    QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
    CACHE_STORE: ${CACHE_STORE:-redis}
    CACHE_PREFIX: ${CACHE_PREFIX:-}
    MEMCACHED_HOST: ${MEMCACHED_HOST:-127.0.0.1}
    REDIS_CLIENT: ${REDIS_CLIENT:-phpredis}
    REDIS_HOST: ${REDIS_HOST:-redis}
    REDIS_PASSWORD: ${REDIS_PASSWORD:-null}
    REDIS_PORT: ${REDIS_PORT:-6379}
    MAIL_MAILER: ${MAIL_MAILER:-log}
    MAIL_SCHEME: ${MAIL_SCHEME:-null}
    MAIL_HOST: ${MAIL_HOST:-127.0.0.1}
    MAIL_PORT: ${MAIL_PORT:-2525}
    MAIL_USERNAME: ${MAIL_USERNAME:-null}
    MAIL_PASSWORD: ${MAIL_PASSWORD:-null}
    MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-hello@example.com}
    MAIL_FROM_NAME: ${MAIL_FROM_NAME:-BookMarket}
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
    AWS_BUCKET: ${AWS_BUCKET:-}
    AWS_USE_PATH_STYLE_ENDPOINT: ${AWS_USE_PATH_STYLE_ENDPOINT:-false}
    SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-perrin.skrbe.com}
    CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://perrin.skrbe.com}
    STRIPE_KEY: ${STRIPE_KEY:-}
    STRIPE_SECRET: ${STRIPE_SECRET:-}
    STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    STRIPE_PLATFORM_FEE_PERCENT: ${STRIPE_PLATFORM_FEE_PERCENT:-8}
    REVERB_APP_ID: ${REVERB_APP_ID:-bookmarket}
    REVERB_APP_KEY: ${REVERB_APP_KEY:-bookmarket-key}
    REVERB_APP_SECRET: ${REVERB_APP_SECRET:-bookmarket-secret}
    REVERB_HOST: ${REVERB_HOST:-0.0.0.0}
    REVERB_PORT: ${REVERB_PORT:-8080}
    REVERB_SCHEME: ${REVERB_SCHEME:-http}
    VITE_APP_NAME: ${VITE_APP_NAME:-BookMarket}
    RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}

services:
  app:
    <<: *app-image
    command: start-web
    depends_on:
      - postgres
      - redis

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - app-storage:/var/www/html/storage:ro
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-bookmarket}
      POSTGRES_USER: ${DB_USERNAME:-bookmarket}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bookmarket}
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  queue:
    <<: *app-image
    command: php artisan queue:work --tries=3
    depends_on:
      - app
      - postgres
      - redis

  reverb:
    <<: *app-image
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    expose:
      - "8080"
    depends_on:
      - app
      - redis

volumes:
  app-storage:
  postgres-data:
